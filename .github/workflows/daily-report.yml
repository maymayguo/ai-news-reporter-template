name: Daily AI News Report

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  contents: write  # 允许推送报告

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: false

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate daily report
        run: npm run collect
        env:
          TZ: 'Asia/Shanghai'

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ steps.date.outputs.date }}
          path: reports/daily/*.md
          retention-days: 30

      - name: Commit report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/daily/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: add daily report ${{ steps.date.outputs.date }}"
          git push

      - name: Create release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: report-${{ steps.date.outputs.date }}
          name: AI News Report - ${{ steps.date.outputs.date }}
          files: reports/daily/*.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
